<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Peek Test — Large DOM</title>
<style>
  body { margin: 0; padding: 20px; font-family: sans-serif; background: #f5f5f5; }
  .row { display: flex; gap: 8px; padding: 4px 0; flex-wrap: wrap; }
  .cell {
    padding: 6px 10px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 12px;
  }
  /*
    Each row contributes ~20 cells × 50 rows = 1000 elements, well past
    the 100-200 elements of liying.github.io. Element mode should still
    capture a single .target-cell quickly because v0.5.14 passes only
    that element's subtree to modern-screenshot — not documentElement.
    Pre-v0.5.14 this page would have been ~3-5× slower than test_page.html
    even though only one cell needs to be rendered.
  */
  .target-cell {
    background: #ffe082;
    border-color: #f57f17;
    font-weight: bold;
  }
</style>
</head>
<body>
  <h1 id="title">Large-DOM test page</h1>
  <p>1000 cells below — Element mode should pick exactly one and not
     walk the rest of the DOM.</p>

  <div id="grid">
    <script>
      // Generate 50 rows × 20 cells = 1000 elements.
      const grid = document.getElementById("grid");
      for (let r = 0; r < 50; r++) {
        const row = document.createElement("div");
        row.className = "row";
        for (let c = 0; c < 20; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = `r${r}c${c}`;
          if (r === 25 && c === 10) {
            cell.id = "target-cell";
            cell.classList.add("target-cell");
            cell.textContent = "TARGET";
          }
          row.appendChild(cell);
        }
        grid.appendChild(row);
      }
    </script>
  </div>
</body>
</html>
